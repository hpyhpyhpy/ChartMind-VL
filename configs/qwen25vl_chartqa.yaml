model:
  id: Qwen/Qwen2.5-VL-7B-Instruct
  torch_dtype: bfloat16
  load_in_4bit: true
  max_pixels: 1003520

dataset:
  id: HuggingFaceM4/ChartQA
  train_split: train[:1%]
  validation_split: val[:1%]
  test_split: test[:1%]
  image_field: image
  question_field: query
  answer_field: label

lora:
  r: 8
  alpha: 16
  dropout: 0.1
  target_modules:
    - q_proj
    - v_proj

training:
  output_dir: outputs/qwen25vl-chartqa-smoke
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  num_train_epochs: 1
  max_steps: 20
  logging_steps: 1
  save_steps: 20
  gradient_checkpointing: true

evaluation:
  max_samples: 100
  metrics:
    - exact_match
    - token_f1
    - numeric_accuracy

output:
  reports_dir: reports
  adapters_dir: outputs
  cache_dir: .cache/huggingface
